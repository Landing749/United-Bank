<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>United Bank — Admin Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060810;--s1:#0d1117;--s2:#131920;--s3:#1a2230;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --gold:#c9a84c;--gold-lt:#e2c97e;--gold-dk:#9a7830;
  --g10:rgba(201,168,76,.10);--g20:rgba(201,168,76,.20);
  --em:#0fa36a;--em-lt:#12c98a;--e10:rgba(15,163,106,.10);--e20:rgba(15,163,106,.20);
  --red:#e05050;--r10:rgba(224,80,80,.10);--r20:rgba(224,80,80,.20);
  --amb:#e09040;--a10:rgba(224,144,64,.10);--a20:rgba(224,144,64,.20);
  --blue:#4a8cdb;--b10:rgba(74,140,219,.10);--b20:rgba(74,140,219,.20);
  --pur:#9b6ee0;--p10:rgba(155,110,224,.10);
  --text:#fff;--t80:rgba(255,255,255,.8);--t60:rgba(255,255,255,.6);
  --t40:rgba(255,255,255,.4);--t20:rgba(255,255,255,.2);--t10:rgba(255,255,255,.1);
  --r:14px;--rsm:9px;
}
html{scroll-behavior:smooth;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px;}
button,input,select,textarea{font-family:inherit;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden;}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 20% 50%,rgba(201,168,76,.08) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(15,163,106,.06) 0%,transparent 60%);}
#login-screen::after{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--t10) 1px,transparent 1px),linear-gradient(90deg,var(--t10) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse 60% 80% at 50% 50%,black 30%,transparent 100%);opacity:.25;}
.lbox{background:var(--s1);border:1px solid var(--border2);border-radius:24px;padding:52px 44px;max-width:420px;width:100%;position:relative;z-index:1;box-shadow:0 60px 120px rgba(0,0,0,.8),0 0 80px var(--g10);animation:fadeUp .4s ease-out;}
.llogo{width:60px;height:60px;margin:0 auto 20px;background:linear-gradient(135deg,var(--gold-dk),var(--gold));border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--bg);box-shadow:0 8px 24px var(--g20);}
.ltitle{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;text-align:center;margin-bottom:4px;}
.lsub{text-align:center;font-size:11px;color:var(--t40);letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px;}
.lerr{background:var(--r10);border:1px solid var(--r20);border-radius:var(--rsm);padding:10px 13px;color:var(--red);font-size:12px;margin-bottom:12px;display:none;}

/* INPUTS */
.lbl{display:block;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t40);margin-bottom:5px;font-family:'JetBrains Mono',monospace;}
.inp{width:100%;padding:11px 13px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-size:13px;font-family:'JetBrains Mono',monospace;outline:none;transition:all .2s;}
.inp::placeholder{color:var(--t20);}
.inp:focus{border-color:var(--g20);box-shadow:0 0 0 3px var(--g10);}
.inp-g{margin-bottom:13px;}
select.inp option{background:var(--s1);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--rsm);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:all .2s;border:none;white-space:nowrap;}
.btn svg{width:13px;height:13px;stroke:currentColor;flex-shrink:0;}
.btn-gold{background:linear-gradient(135deg,var(--gold-dk),var(--gold));color:var(--bg);box-shadow:0 2px 12px var(--g20);}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--g20);}
.btn-ghost{background:var(--s2);border:1px solid var(--border);color:var(--t60);}
.btn-ghost:hover{border-color:var(--border2);color:var(--text);}
.btn-danger{background:var(--r10);border:1px solid var(--r20);color:var(--red);}
.btn-danger:hover{background:var(--r20);}
.btn-success{background:var(--e10);border:1px solid var(--e20);color:var(--em-lt);}
.btn-success:hover{background:var(--e20);}
.btn-info{background:var(--b10);border:1px solid var(--b20);color:var(--blue);}
.btn-warn{background:var(--a10);border:1px solid var(--a20);color:var(--amb);}
.btn-login-full{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold-dk),var(--gold));border:none;border-radius:var(--rsm);color:var(--bg);font-size:13px;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px var(--g20);}
.btn-login-full:hover{opacity:.9;transform:translateY(-1px);}
.btn-login-full:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-sm{padding:5px 12px;font-size:11px;}
.btn-xs{padding:3px 9px;font-size:10px;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;}

/* APP LAYOUT */
.app{display:none;min-height:100vh;}
.app.active{display:flex;}
.sidebar{width:248px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200;transition:transform .3s;}
.sb-head{padding:16px 13px;border-bottom:1px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
.sb-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--gold-dk),var(--gold));border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:700;color:var(--bg);flex-shrink:0;}
.sb-bank{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;}
.sb-user{display:flex;align-items:center;gap:9px;padding:9px 10px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);}
.sb-av{width:30px;height:30px;background:linear-gradient(135deg,var(--gold-dk),var(--gold));border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:var(--bg);flex-shrink:0;}
.sb-uname{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-role{font-size:9px;color:var(--gold);font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.sb-nav{flex:1;padding:12px 9px;overflow-y:auto;}
.nav-grp{margin-bottom:18px;}
.nav-grp-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--t40);padding:0 7px 7px;opacity:.6;}
.ni{display:flex;align-items:center;gap:8px;padding:8px 7px;border-radius:var(--rsm);color:var(--t60);cursor:pointer;transition:all .15s;font-size:12px;font-weight:600;margin-bottom:2px;user-select:none;}
.ni:hover{background:var(--s2);color:var(--t80);}
.ni.active{background:var(--g10);color:var(--gold-lt);border:1px solid var(--g20);}
.ni svg{width:14px;height:14px;flex-shrink:0;stroke:currentColor;}
.ni-badge{margin-left:auto;padding:1px 7px;border-radius:100px;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.ni-badge.red{background:var(--r10);border:1px solid var(--r20);color:var(--red);}
.ni-badge.gold{background:var(--g10);border:1px solid var(--g20);color:var(--gold-lt);}
.sb-foot{padding:10px 9px;border-top:1px solid var(--border);}
.btn-signout{width:100%;padding:9px;background:transparent;border:1px solid var(--border2);border-radius:var(--rsm);color:var(--t60);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-signout svg{width:13px;height:13px;stroke:currentColor;}
.btn-signout:hover{border-color:var(--r20);color:var(--red);background:var(--r10);}
.sb-toggle{display:none;position:fixed;top:13px;left:13px;z-index:300;width:36px;height:36px;background:var(--s1);border:1px solid var(--border2);border-radius:9px;align-items:center;justify-content:center;cursor:pointer;}
.sb-toggle svg{width:16px;height:16px;stroke:var(--t60);}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:190;}

/* MAIN */
.main{flex:1;margin-left:248px;display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:58px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:100;flex-shrink:0;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;}
.tb-right{display:flex;align-items:center;gap:10px;}
.live-dot{width:6px;height:6px;background:var(--em-lt);border-radius:50%;animation:blink 2s ease-in-out infinite;}
.live-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t40);}
.content{padding:22px;flex:1;}

/* BOXES */
.box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:18px;}
.box-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.box-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;}
.box-actions{display:flex;gap:7px;flex-wrap:wrap;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px;margin-bottom:18px;}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;}
.sc:hover{border-color:var(--border2);transform:translateY(-2px);}
.sc-bar{position:absolute;top:0;left:0;right:0;height:2px;}
.sc-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t40);margin-bottom:5px;font-family:'JetBrains Mono',monospace;}
.sc-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;line-height:1;}

/* TABLE */
.tbl-wrap{overflow-x:auto;}
table.tbl{width:100%;border-collapse:collapse;}
.tbl thead th{text-align:left;padding:9px 13px;font-size:9px;font-weight:700;color:var(--t40);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);white-space:nowrap;font-family:'JetBrains Mono',monospace;}
.tbl tbody td{padding:13px;border-bottom:1px solid var(--border);font-size:12px;color:var(--t80);vertical-align:middle;}
.tbl tbody tr{transition:background .15s;}
.tbl tbody tr:hover{background:var(--s2);}
.tbl tbody tr:last-child td{border-bottom:none;}
.mono{font-family:'JetBrains Mono',monospace;}
.tbl-empty{text-align:center;padding:40px;color:var(--t40);font-size:12px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:100px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.bg{background:var(--e10);color:var(--em-lt);border:1px solid var(--e20);}
.br{background:var(--r10);color:var(--red);border:1px solid var(--r20);}
.ba{background:var(--a10);color:var(--amb);border:1px solid var(--a20);}
.bb{background:var(--b10);color:var(--blue);border:1px solid var(--b20);}
.bp{background:var(--p10);color:var(--pur);border:1px solid rgba(155,110,224,.2);}
.bgr{background:var(--t10);color:var(--t40);border:1px solid var(--border);}

/* FORM */
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:13px;margin-bottom:13px;}
.ff{display:flex;flex-direction:column;gap:5px;}
.ff.full{grid-column:1/-1;}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
.fsec{grid-column:1/-1;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t40);font-family:'JetBrains Mono',monospace;padding-top:6px;border-top:1px solid var(--border);}
.inp-add{position:relative;}
.inp-add .inp{padding-right:72px;}
.inp-add-btn{position:absolute;right:4px;top:50%;transform:translateY(-50%);padding:4px 9px;background:var(--s3);border:1px solid var(--border2);border-radius:6px;color:var(--gold-lt);font-size:10px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.inp-add-btn:hover{background:var(--g10);}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(14px);z-index:1000;align-items:center;justify-content:center;padding:18px;}
.modal.active{display:flex;}
.modal-box{background:var(--s1);border:1px solid var(--border2);border-radius:18px;padding:32px;max-width:620px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 60px 120px rgba(0,0,0,.9);position:relative;animation:slideUp .3s ease-out;}
.modal-box.wide{max-width:780px;}
.mc{position:absolute;top:16px;right:16px;width:30px;height:30px;background:var(--s2);border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--t60);cursor:pointer;transition:all .2s;font-size:15px;line-height:1;}
.mc:hover{background:var(--r10);border-color:var(--r20);color:var(--red);}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--t40);margin-bottom:20px;}

/* SCORE METER */
.score-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:5px;}
.score-fill{height:100%;border-radius:3px;transition:width .4s ease;}
.pw-bar{height:4px;background:var(--s3);border-radius:2px;margin-top:5px;overflow:hidden;}
.pw-fill{height:100%;border-radius:2px;transition:all .3s;}

/* INFO ROW */
.ir{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;}
.ir:last-child{border-bottom:none;}
.ik{color:var(--t40);}
.iv{font-family:'JetBrains Mono',monospace;color:var(--t80);}

/* ALERT BOXES */
.alert{border-radius:var(--rsm);padding:12px 16px;font-size:12px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;}
.alert svg{width:15px;height:15px;flex-shrink:0;margin-top:1px;}
.alert-danger{background:var(--r10);border:1px solid var(--r20);color:var(--red);}
.alert-warn{background:var(--a10);border:1px solid var(--a20);color:var(--amb);}
.alert-success{background:var(--e10);border:1px solid var(--e20);color:var(--em-lt);}

/* TOASTS */
#toasts{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--s2);border:1px solid var(--border2);border-radius:11px;padding:11px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;min-width:200px;box-shadow:0 20px 48px rgba(0,0,0,.6);animation:sR .3s ease-out;pointer-events:all;}
.toast.ok{border-color:var(--e20);color:var(--em-lt);}
.toast.err{border-color:var(--r20);color:var(--red);}
.toast.info{border-color:var(--g20);color:var(--gold-lt);}
.toast svg{width:14px;height:14px;flex-shrink:0;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes sR{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);}}
@keyframes fO{to{opacity:0;transform:translateX(14px);}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sb-toggle{display:flex;}
  .sb-overlay.open{display:block;}
  .main{margin-left:0;}
  .content{padding:14px;}
  .topbar{padding:0 14px 0 52px;}
  .two-col,.three-col{grid-template-columns:1fr;}
}
@media(max-width:560px){.stats-row{grid-template-columns:1fr 1fr;}.fg{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- TOASTS -->
<div id="toasts"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lbox">
    <div class="llogo">UB</div>
    <h1 class="ltitle">Command Center</h1>
    <p class="lsub">Admin Access Only</p>
    <div class="lerr" id="lerr"></div>
    <form onsubmit="doLogin(event)">
      <div class="inp-g"><label class="lbl">Username</label><input class="inp" id="l-u" type="text" autocomplete="off" required></div>
      <div class="inp-g"><label class="lbl">Password</label><input class="inp" id="l-p" type="password" required></div>
      <button type="submit" class="btn-login-full" id="l-btn">Access Portal</button>
    </form>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <button class="sb-toggle" id="sbt" onclick="toggleSb()">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
  </button>
  <div class="sb-overlay" id="sbo" onclick="closeSb()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">
        <div class="sb-icon">UB</div>
        <span class="sb-bank">United Bank</span>
      </div>
      <div class="sb-user">
        <div class="sb-av" id="sb-av">A</div>
        <div><div class="sb-uname" id="sb-nm">Admin</div><div class="sb-role">Super Admin</div></div>
      </div>
    </div>
    <nav class="sb-nav" id="nav"></nav>
    <div class="sb-foot">
      <button class="btn-signout" onclick="logout()">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
        Sign Out
      </button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <h2 class="page-title" id="ptitle">Dashboard</h2>
      <div class="tb-right">
        <div class="live-dot"></div>
        <span class="live-time" id="clk">—</span>
        <button class="btn btn-ghost btn-sm" onclick="refreshAll()">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
          Refresh
        </button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- MODALS -->
<div class="modal" id="m-edit"><div class="modal-box wide"><button class="mc" onclick="cm('m-edit')">✕</button><div id="m-edit-body"></div></div></div>
<div class="modal" id="m-view"><div class="modal-box wide"><button class="mc" onclick="cm('m-view')">✕</button><div id="m-view-body"></div></div></div>
<div class="modal" id="m-tx"><div class="modal-box"><button class="mc" onclick="cm('m-tx')">✕</button><div id="m-tx-body"></div></div></div>
<div class="modal" id="m-confirm"><div class="modal-box" style="max-width:400px;"><button class="mc" onclick="cm('m-confirm')">✕</button><div id="m-confirm-body"></div></div></div>

// ── LOGIN ─────────────────────────────────────────────────────────────────────
async function doLogin(e) {
  e.preventDefault();
  const u=document.getElementById('l-u').value.trim(), p=document.getElementById('l-p').value;
  const err=document.getElementById('lerr'), btn=document.getElementById('l-btn');
  err.style.display='none'; btn.disabled=true; btn.textContent='Verifying...';
  try {
    if (!db) throw new Error('Database not connected. Check Firebase config.');
    const snap = await db.ref('users/'+u).once('value');
    if (!snap.exists()) { showLE('Account not found.'); return; }
    const d = snap.val();
    if (d.password !== p) { showLE('Incorrect password.'); return; }
    if (u !== 'AvidChip7377') { showLE('Admin access only.'); return; }
    admin = {username:u,...d};
    document.getElementById('sb-av').textContent = u[0].toUpperCase();
    document.getElementById('sb-nm').textContent = u;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('active');
    buildNav();
    await refreshAll();
    navTo('dashboard');
  } catch(ex){ showLE('Error: '+ex.message); }
  finally { btn.disabled=false; btn.textContent='Access Portal'; }
}
function showLE(m){ const e=document.getElementById('lerr'); e.textContent=m; e.style.display='block'; document.getElementById('l-btn').disabled=false; document.getElementById('l-btn').textContent='Access Portal'; }

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
async function refreshAll() {
  await Promise.all([
    loadMap('users', accounts),
    loadMap('loans', loans),
    loadMap('cards', cards),
    loadMap('collateral', collateral),
    loadMap('blacklist', blacklist),
    loadMap('audit', auditLog),
    loadSettings()
  ]);
  updateBadges();
  if(curPage) renderPage(curPage);
}
async function loadMap(path, target) {
  const s = await db.ref(path).once('value');
  Object.keys(target).forEach(k=>delete target[k]);
  if (s.val()) Object.assign(target, s.val());
}
async function loadSettings() {
  const s = await db.ref('settings').once('value');
  if (s.val()) Object.assign(settings, s.val());
}
function updateBadges() {
  const pending = Object.values(loans).filter(l=>l.status==='pending').length;
  const blCount = Object.keys(blacklist).length;
  ['nb-approvals'].forEach(id=>{ const e=document.getElementById(id); if(e){e.textContent=pending||'';e.style.display=pending?'':'none';} });
  ['nb-bl'].forEach(id=>{ const e=document.getElementById(id); if(e){e.textContent=blCount||'';e.style.display=blCount?'':'none';} });
}

function ni(page, path, label, badgeId='', badgeType='') {
  const badge = badgeId ? `<span class="ni-badge ${badgeType}" id="${badgeId}" style="display:none;"></span>` : '';
  return `<div class="ni" data-page="${page}" onclick="navTo('${page}')">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" style="width:14px;height:14px;flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="${path}"/></svg>
    ${label}${badge}
  </div>`;
}

function navTo(page) {
  curPage = page;
  document.querySelectorAll('.ni[data-page]').forEach(n=>n.classList.toggle('active', n.dataset.page===page));
  document.getElementById('ptitle').textContent = PAGES[page]||page;
  closeSb();
  renderPage(page);
}
function renderPage(page) {
  const el = document.getElementById('content');
  const map = {
    dashboard:rDashboard, accounts:rAccounts, 'create-acct':rCreate,
    'bulk-create':rBulk, balances:rBalances, 'card-issuer':rCardIssuer,
    scores:rScores, approvals:rApprovals, 'all-loans':rAllLoans,
    repayments:rRepayments, collateral:rCollateral, blacklist:rBlacklist,
    fraud:rFraud, 'mass-ops':rMassOps, 'system-tools':rSystemTools,
    audit:rAudit, settings:rSettings
  };
  if (map[page]) map[page](el);
}

function prevBulk(){const ls=document.getElementById('bl-in').value.trim().split('\n').filter(l=>l.trim());document.getElementById('bl-prev').innerHTML=ls.map(line=>{const[u,p,b,s]=line.split(',').map(x=>x.trim());const v=u&&p;return`<div style="padding:6px 10px;background:${v?'var(--e10)':'var(--r10)'};border:1px solid ${v?'var(--e20)':'var(--r20)'};border-radius:var(--rsm);margin-bottom:5px;font-size:11px;font-family:'JetBrains Mono',monospace;display:flex;gap:12px;flex-wrap:wrap;"><span style="color:${v?'var(--em-lt)':'var(--red)'};">${v?'✓':'✗'}</span><span style="color:var(--text);">${esc(u||'missing')}</span><span style="color:var(--t40);">◆${fn(parseFloat(b)||0)}</span><span style="color:var(--t60);">score:${s||'500'}</span></div>`;}).join('')||'<p style="color:var(--t40);font-size:12px;">Nothing to preview.</p>';}
async function runBulk(){const ls=document.getElementById('bl-in').value.trim().split('\n').filter(l=>l.trim());if(!ls.length){toast('No data.','err');return;}const ct=document.getElementById('bl-card').value,lim=parseFloat(document.getElementById('bl-lim').value)||5000;const btn=document.getElementById('bl-btn');btn.disabled=true;let ok=0,skip=0,fail=0;const res=[];for(const line of ls){const[u,p,b,s]=line.split(',').map(x=>x.trim());if(!u||!p){fail++;res.push(`<span style="color:var(--red);">✗ Missing fields: ${esc(line)}</span>`);continue;}try{const ex=await db.ref('users/'+u).once('value');if(ex.exists()){skip++;res.push(`<span style="color:var(--amb);">⚠ Exists: ${esc(u)}</span>`);continue;}const d={password:p,balance:parseFloat(b)||0,creditScore:parseInt(s)||500,accountNumber:'UB'+Date.now().toString().slice(-8),cardFrozen:false,createdAt:Date.now(),createdBy:admin.username};if(ct!=='no'){d.cardNumber=Array.from({length:4},()=>Math.floor(1000+Math.random()*9000)).join(' ');d.cvv=Math.floor(100+Math.random()*900).toString();d.expiry=`12/${(new Date().getFullYear()+3).toString().slice(-2)}`;d.cardType=ct;d.creditLimit=lim;d.cardStatus='active';}await db.ref('users/'+u).set(d);accounts[u]=d;ok++;res.push(`<span style="color:var(--em-lt);">✓ ${esc(u)} ◆${fn(d.balance)} score:${d.creditScore}</span>`);}catch(e){fail++;res.push(`<span style="color:var(--red);">✗ ${esc(u)}: ${e.message}</span>`);}}

async function issueCard(){const u=document.getElementById('ci-u').value,t=document.getElementById('ci-t').value,l=parseFloat(document.getElementById('ci-l').value)||5000,e=document.getElementById('ci-e').value;if(!u){toast('Select a user.','err');return;}const cn=Array.from({length:4},()=>Math.floor(1000+Math.random()*9000)).join(' '),cvv=Math.floor(100+Math.random()*900).toString();await db.ref('users/'+u).update({cardNumber:cn,cvv,expiry:e,cardExpiry:e,cardType:t,creditLimit:l,cardStatus:'active',cardFrozen:false,frozen:false});await db.ref('cards').push({username:u,cardNumber:cn,cvv,expiry:e,cardType:t,creditLimit:l,status:'active',createdAt:Date.now()});await la('CARD_ISSUED',`Admin issued ${t} card to ${u}`);accounts[u]={...accounts[u],cardNumber:cn,cvv,expiry:e,cardType:t,creditLimit:l,cardFrozen:false};toast(`${t} card issued to ${u}!`,'ok');rCardIssuer(document.getElementById('content'));}

function rScores(el){

  ${sorted.map(([u,d],i)=>{const sc=d.creditScore||0,t=creditTier(sc),ml=maxLoan(sc,d.balance||0),rc=['var(--gold)','#C0C0C0','#CD7F32'];

    <td><div style="display:flex;gap:3px;"><button class="btn btn-ghost btn-xs" onclick="autoScore('${u}')">Auto</button><button class="btn btn-success btn-xs" onclick="nudgeScore('${u}',50)">+50</button><button class="btn btn-danger btn-xs" onclick="nudgeScore('${u}',-50)">-50</button><button class="btn btn-success btn-xs" onclick="nudgeScore('${u}',100)">+100</button><button class="btn btn-danger btn-xs" onclick="nudgeScore('${u}',-100)">-100</button></div></td>

async function setScore(u){const v=parseInt(document.getElementById('ss-'+u)?.value);if(isNaN(v)||v<1||v>1000){toast('Score 1–1000.','err');return;}await db.ref('users/'+u+'/creditScore').set(v);accounts[u]={...accounts[u],creditScore:v};await la('CREDIT_SCORE_SET',`Admin set ${u} score to ${v}`);toast(`${u}: score → ${v}`,'ok');rScores(document.getElementById('content'));}
async function nudgeScore(u,d){const c=accounts[u]?.creditScore||500,n=Math.max(1,Math.min(1000,c+d));await db.ref('users/'+u+'/creditScore').set(n);accounts[u]={...accounts[u],creditScore:n};toast(`${u}: ${c} → ${n}`,'ok');rScores(document.getElementById('content'));}
async function autoScore(u){const ls=await db.ref('loans').orderByChild('borrower').equalTo(u).once('value'),lv=Object.values(ls.val()||{});const paid=lv.filter(l=>l.status==='paid').length,defs=lv.filter(l=>l.status==='denied').length,act=lv.filter(l=>l.status==='active').length,bal=accounts[u]?.balance||0;let s=500;s+=paid*60;s-=defs*120;s-=act*15;if(bal>=500)s+=40;if(bal>=2000)s+=60;if(bal>=5000)s+=80;if(bal>=10000)s+=120;s=Math.max(1,Math.min(1000,s));await db.ref('users/'+u+'/creditScore').set(s);accounts[u]={...accounts[u],creditScore:s};return s;}
async function autoAllScores(){for(const u of Object.keys(accounts))await autoScore(u);await refreshAll();toast(`Scores recalculated for ${Object.keys(accounts).length} accounts.`,'ok');rScores(document.getElementById('content'));}

async function approveLoan(id){const l=loans[id];if(!l)return;const u=accounts[l.borrower]||{};const nb=(u.balance||0)+l.principal;await db.ref('loans/'+id).update({status:'active',approvedAt:Date.now(),approvedBy:admin.username});await db.ref('users/'+l.borrower+'/balance').set(nb);await ltx(l.borrower,`Loan disbursement ◆${fn(l.principal)}`,l.principal,'credit');loans[id]={...l,status:'active'};if(accounts[l.borrower])accounts[l.borrower].balance=nb;await la('LOAN_APPROVED',`Admin approved ◆${fn(l.principal)} loan for ${l.borrower}`);toast(`Approved! ◆${fn(l.principal)} disbursed to ${l.borrower}.`,'ok');updateBadges();rApprovals(document.getElementById('content'));}
async function denyLoan(id){if(!confirm('Deny this loan?'))return;await db.ref('loans/'+id).update({status:'denied',deniedAt:Date.now(),deniedBy:admin.username});loans[id]={...loans[id],status:'denied'};await la('LOAN_DENIED',`Admin denied loan ${id.slice(0,8)}`);toast('Loan denied.','info');updateBadges();rApprovals(document.getElementById('content'));}

async function doRecordPayment(id){const amt=parseFloat(document.getElementById('rp-amt').value),note=document.getElementById('rp-note').value||'Installment';if(isNaN(amt)||amt<=0){toast('Enter valid amount.','err');return;}const l=loans[id];const rem=Math.max(0,(l.remaining!==undefined?l.remaining:l.totalDue)-amt);const newSt=rem<=0?'paid':'active';await db.ref('loans/'+id).update({remaining:rem,paidInstallments:(l.paidInstallments||0)+1,status:newSt,lastPayment:Date.now()});const ubal=(accounts[l.borrower]?.balance||0);await db.ref('users/'+l.borrower+'/balance').set(Math.max(0,ubal-amt));await ltx(l.borrower,`Loan repayment — ${note}`,amt,'debit');loans[id]={...l,remaining:rem,status:newSt};if(accounts[l.borrower])accounts[l.borrower].balance=Math.max(0,ubal-amt);await la('PAYMENT_RECORDED',`◆${fn(amt)} payment for ${l.borrower}'s loan`);toast(`Payment of ◆${fn(amt)} recorded. Remaining: ◆${fn(rem)}`,'ok');cm('m-tx');rRepayments(document.getElementById('content'));}

function addCollateral(){document.getElementById('m-tx-body').innerHTML=`<h2 class="modal-title">Log Collateral</h2><p class="modal-sub">Record a held item</p><div class="fg"><div class="ff"><label class="lbl">Borrower</label><input class="inp" id="col-u" placeholder="Username"></div><div class="ff"><label class="lbl">Item / Asset</label><input class="inp" id="col-i" placeholder="e.g. Diamond Sword"></div><div class="ff"><label class="lbl">Value (◆)</label><input class="inp" id="col-v" type="number" placeholder="0"></div><div class="ff"><label class="lbl">Linked Loan ID</label><input class="inp" id="col-l" placeholder="Optional"></div><div class="ff full"><label class="lbl">Notes</label><input class="inp" id="col-n" placeholder="Additional details..."></div></div><div class="fa"><button class="btn btn-ghost" onclick="cm('m-tx')">Cancel</button><button class="btn btn-gold" onclick="saveColl()">Log Item</button></div>`;om('m-tx');}
async function saveColl(){const u=document.getElementById('col-u').value.trim(),i=document.getElementById('col-i').value.trim();if(!u||!i){toast('Borrower and item required.','err');return;}await db.ref('collateral').push({borrower:u,item:i,value:parseFloat(document.getElementById('col-v').value)||0,loanId:document.getElementById('col-l').value,notes:document.getElementById('col-n').value,status:'held',loggedBy:admin.username,createdAt:Date.now()});await loadMap('collateral',collateral);await la('COLLATERAL_LOGGED',`Admin logged collateral: ${i} for ${u}`);toast('Collateral logged.','ok');cm('m-tx');rCollateral(document.getElementById('content'));}
async function returnColl(id){await db.ref('collateral/'+id).update({status:'returned',returnedAt:Date.now()});collateral[id]={...collateral[id],status:'returned'};toast('Item marked as returned.','ok');rCollateral(document.getElementById('content'));}
async function delColl(id){if(!confirm('Remove this collateral record?'))return;await db.ref('collateral/'+id).remove();delete collateral[id];toast('Record deleted.','info');rCollateral(document.getElementById('content'));}

//  FRAUD DETECTION
// ══════════════════════════════════════════════════════════════════════════════
function rFraud(el){
  const alerts=[];
  for(const[u,d] of Object.entries(accounts)){
    const ul=Object.values(loans).filter(l=>l.borrower===u);
    const bal=d.balance||0;const debt=ul.filter(l=>l.status==='active').reduce((s,l)=>s+(l.remaining||0),0);const defs=ul.filter(l=>l.status==='denied').length;const pend=ul.filter(l=>l.status==='pending').length;const sc=d.creditScore||0;
    if(debt>bal*10&&bal>0)alerts.push({u,sev:'HIGH',desc:'Extreme debt-to-balance ratio',detail:`Debt ◆${fn(debt)} vs Balance ◆${fn(bal)}`});
    if(defs>=3)alerts.push({u,sev:'HIGH',desc:'Repeated loan defaults',detail:`${defs} defaults on record`});
    if(pend>=3)alerts.push({u,sev:'MEDIUM',desc:'Multiple simultaneous requests',detail:`${pend} pending applications`});
    if(bal<=0&&debt>0)alerts.push({u,sev:'MEDIUM',desc:'Zero balance with active debt',detail:'No recovery assets'});
    if(sc>0&&sc<200&&debt>0)alerts.push({u,sev:'LOW',desc:'Very low score with active debt',detail:`Score: ${sc}/1000`});
    if(d.cardFrozen&&debt>0)alerts.push({u,sev:'LOW',desc:'Frozen card with outstanding debt',detail:`Debt: ◆${fn(debt)}`});
  }
  const sevColor={HIGH:'var(--red)',MEDIUM:'var(--amb)',LOW:'var(--gold)'};
  el.innerHTML=`<div class="box"><div class="box-head"><h3 class="box-title">Fraud Detection <span style="font-size:12px;color:${alerts.length>0?'var(--red)':'var(--em-lt)'};font-family:'JetBrains Mono',monospace;">${alerts.length} alert${alerts.length!==1?'s':''}</span></h3></div>
  ${!alerts.length?`<div class="alert alert-success">${svg('M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z')} No fraud indicators detected across all accounts.</div>`:`
  <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Severity</th><th>Username</th><th>Alert</th><th>Detail</th><th>Actions</th></tr></thead><tbody>
  ${alerts.map(a=>`<tr>
    <td><span class="badge" style="background:${sevColor[a.sev]}20;color:${sevColor[a.sev]};border:1px solid ${sevColor[a.sev]}40;">${a.sev}</span></td>
    <td><strong>${esc(a.u)}</strong></td><td style="font-size:12px;">${esc(a.desc)}</td><td style="font-size:11px;color:var(--t60);">${esc(a.detail)}</td>
    <td><div style="display:flex;gap:4px;">
      <button class="btn btn-ghost btn-xs" onclick="viewAcct('${a.u}')">View</button>
      <button class="btn btn-danger btn-xs" onclick="addBL();document.getElementById('bl-u').value='${a.u}'">Blacklist</button>
    </div></td></tr>`).join('')}
  </tbody></table></div>`}
  </div>`;
}

    <button class="btn btn-danger" onclick="massFreeze(true)">🔒 Freeze ALL Cards</button>

  <p style="font-size:12px;color:var(--t60);margin-bottom:14px;">Delete all loans of a specific status.</p>

  <p style="font-size:12px;color:var(--t60);margin-bottom:14px;">Auto-recalculate every account's credit score from loan history.</p>
  <div style="display:flex;flex-direction:column;gap:8px;">
    <button class="btn btn-gold" onclick="autoAllScores()">Auto-Calculate All Scores</button>

async function doMassBalance(){const op=document.getElementById('mo-op').value,amt=parseFloat(document.getElementById('mo-amt').value);if(isNaN(amt)){toast('Enter amount.','err');return;}if(!confirm(`Apply ${op} ◆${fn(amt)} to ALL ${Object.keys(accounts).length} accounts?`))return;let n=0;for(const[u,d] of Object.entries(accounts)){let nb;if(op==='set')nb=amt;else if(op==='add')nb=(d.balance||0)+amt;else if(op==='sub')nb=Math.max(0,(d.balance||0)-amt);else nb=(d.balance||0)*amt;await db.ref('users/'+u+'/balance').set(nb);accounts[u]={...accounts[u],balance:nb};n++;}await la('MASS_BALANCE',`Admin mass-${op} ◆${amt} on ${n} accounts`);toast(`Applied to ${n} accounts.`,'ok');}
async function massFreeze(freeze){if(!confirm(`${freeze?'Freeze':'Unfreeze'} ALL cards?`))return;let n=0;for(const u of Object.keys(accounts)){await db.ref('users/'+u).update({cardFrozen:freeze,frozen:freeze});accounts[u]={...accounts[u],cardFrozen:freeze,frozen:freeze};n++;}await la(freeze?'MASS_FREEZE':'MASS_UNFREEZE',`Admin ${freeze?'froze':'unfroze'} all ${n} cards`);toast(`${n} cards ${freeze?'frozen':'unfrozen'}.`,'ok');}
async function doMassScore(){const op=document.getElementById('ms-op').value,amt=parseInt(document.getElementById('ms-amt').value)||0;if(op==='auto'){await autoAllScores();return;}if(!confirm(`Apply score ${op} ${amt} to all accounts?`))return;for(const[u,d] of Object.entries(accounts)){let ns;const cur=d.creditScore||500;if(op==='set')ns=Math.max(1,Math.min(1000,amt));else if(op==='add')ns=Math.max(1,Math.min(1000,cur+amt));else ns=Math.max(1,Math.min(1000,cur-amt));await db.ref('users/'+u+'/creditScore').set(ns);accounts[u]={...accounts[u],creditScore:ns};}await la('MASS_SCORE',`Admin mass-${op} score ${amt}`);toast('Scores updated.','ok');}
async function massNotify(){const msg=document.getElementById('mn-msg').value.trim(),amt=parseFloat(document.getElementById('mn-amt').value)||0;if(!msg){toast('Enter message.','err');return;}if(!confirm(`Send "${msg}" to ALL accounts?`))return;for(const u of Object.keys(accounts)){await ltx(u,msg,Math.abs(amt),amt>=0?'credit':'debit');}await la('MASS_NOTIFY',`Admin sent mass notification: ${msg}`);toast(`Sent to ${Object.keys(accounts).length} accounts.`,'ok');}
async function massDeleteLoans(){const st=document.getElementById('mdl-st').value;const targets=Object.entries(loans).filter(([,l])=>l.status===st);if(!targets.length){toast('No loans with that status.','info');return;}if(!confirm(`Delete ${targets.length} ${st} loans permanently?`))return;for(const[id] of targets){await db.ref('loans/'+id).remove();delete loans[id];}await la('MASS_DELETE_LOANS',`Admin deleted all ${st} loans (${targets.length})`);toast(`${targets.length} ${st} loans deleted.`,'ok');}
async function massSetAllScores(v){for(const u of Object.keys(accounts)){await db.ref('users/'+u+'/creditScore').set(v);accounts[u]={...accounts[u],creditScore:v};}toast('All scores reset.','ok');}

function exportData(type){let d;if(type==='accounts')d=accounts;else if(type==='loans')d=loans;else d={accounts,loans,cards,collateral,blacklist,auditLog,settings};const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`unitedbank-${type}-${Date.now()}.json`;a.click();toast(`${type} data exported.`,'ok');}
async function doTransfer(){const from=document.getElementById('tr-from').value.trim(),to=document.getElementById('tr-to').value.trim(),amt=parseFloat(document.getElementById('tr-amt').value),note=document.getElementById('tr-note').value||'Admin transfer';if(!from||!to||isNaN(amt)||amt<=0){toast('Fill all fields.','err');return;}if(!accounts[from]){toast(`From account not found: ${from}`,'err');return;}if(!accounts[to]){toast(`To account not found: ${to}`,'err');return;}const sb=accounts[from].balance||0;if(sb<amt){toast(`Insufficient balance: ◆${fn(sb)}`,'err');return;}const nf=sb-amt,nt=(accounts[to].balance||0)+amt;await db.ref('users/'+from+'/balance').set(nf);await db.ref('users/'+to+'/balance').set(nt);await ltx(from,'Transfer to '+to+': '+note,amt,'debit');await ltx(to,'Transfer from '+from+': '+note,amt,'credit');accounts[from]={...accounts[from],balance:nf};accounts[to]={...accounts[to],balance:nt};await la('ADMIN_TRANSFER',`Admin transferred ◆${fn(amt)} from ${from} to ${to}`);toast(`◆${fn(amt)} transferred from ${from} to ${to}.`,'ok');}
async function doResetPw(){const u=document.getElementById('pr-u').value.trim(),pw=document.getElementById('pr-pw').value;if(!u||!pw){toast('Fill all fields.','err');return;}if(!accounts[u]){toast('Account not found.','err');return;}await db.ref('users/'+u+'/password').set(pw);accounts[u]={...accounts[u],password:pw};await la('PASSWORD_RESET',`Admin reset password for ${u}`);toast(`Password reset for ${u}.`,'ok');}
async function renameAcct(){const oldU=document.getElementById('rn-old').value.trim(),newU=document.getElementById('rn-new').value.trim();if(!oldU||!newU){toast('Fill both fields.','err');return;}if(!accounts[oldU]){toast('Source account not found.','err');return;}if(accounts[newU]){toast('Destination username already exists.','err');return;}if(!confirm(`Copy all data from "${oldU}" to "${newU}" and delete "${oldU}"?`))return;const data={...accounts[oldU],username:newU};await db.ref('users/'+newU).set(data);await db.ref('users/'+oldU).remove();accounts[newU]=data;delete accounts[oldU];await la('ACCOUNT_RENAMED',`Admin renamed ${oldU} to ${newU}`);toast(`Account renamed to ${newU}.`,'ok');rAccounts(document.getElementById('content'));}
async function nukeAccounts(){const keys=Object.keys(accounts).filter(u=>u!==admin.username);for(const u of keys){await db.ref('users/'+u).remove();delete accounts[u];}await la('NUKE_ACCOUNTS',`Admin deleted all accounts except ${admin.username}`);toast(`${keys.length} accounts deleted.`,'info');rAccounts(document.getElementById('content'));}

// ══════════════════════════════════════════════════════════════════════════════
//  AUDIT LOG
// ══════════════════════════════════════════════════════════════════════════════
function rAudit(el){
  const logs=Object.values(auditLog).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
  el.innerHTML=`<div class="box"><div class="box-head"><h3 class="box-title">Audit Log <span style="font-size:12px;color:var(--t40);font-family:'JetBrains Mono',monospace;">${logs.length} entries</span></h3>
  <button class="btn btn-danger btn-sm" onclick="if(confirm('Clear all audit logs?'))db.ref('audit').remove().then(()=>{Object.keys(auditLog).forEach(k=>delete auditLog[k]);toast('Cleared.','info');rAudit(document.getElementById('content'));})">Clear Log</button></div>
  <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Action</th><th>Description</th><th>By</th><th>Time</th></tr></thead><tbody>
  ${logs.map(l=>`<tr>
    <td><span class="badge ${auditBadgeCls(l.action)}">${esc(l.action||'—')}</span></td>
    <td style="font-size:12px;">${esc(l.description||'—')}</td>
    <td class="mono" style="font-size:11px;">${esc(l.by||'—')}</td>
    <td style="font-size:10px;color:var(--t40);">${fd(l.timestamp)}</td>
  </tr>`).join('')||'<tr><td colspan="4" class="tbl-empty">No entries yet.</td></tr>'}
  </tbody></table></div></div>`;
}
function auditBadgeCls(a){if(!a)return 'bgr';if(a.includes('DENIED')||a.includes('FROZEN')||a.includes('BLACK')||a.includes('NUKE')||a.includes('DELETE'))return 'br';if(a.includes('APPROVED')||a.includes('PAID')||a.includes('UNFROZEN')||a.includes('CREATED'))return 'bg';if(a.includes('LOAN')||a.includes('TRANSFER'))return 'bb';if(a.includes('SCORE')||a.includes('CREDIT'))return 'bp';return 'ba';}

  <div class="ir"><span class="ik">Debit Rate</span><span class="iv" style="color:var(--gold);">${settings.debitInterestRate||15}%</span></div>
  <div class="ir"><span class="ik">Min Loan</span><span class="iv" style="color:var(--em-lt);">◆${fn(settings.minLoanAmount||100)}</span></div>

async function saveSettings(){settings.creditInterestRate=parseFloat(document.getElementById('s-cr').value);settings.debitInterestRate=parseFloat(document.getElementById('s-dr').value);settings.minLoanAmount=parseFloat(document.getElementById('s-ml').value);settings.maxLoanAmount=parseFloat(document.getElementById('s-mx').value);await db.ref('settings').set(settings);await la('SETTINGS_UPDATED','Admin updated system settings');toast('Settings saved!','ok');}

// ══════════════════════════════════════════════════════════════════════════════
//  SHARED: VIEW / EDIT ACCOUNT
// ══════════════════════════════════════════════════════════════════════════════
function viewAcct(u){const d=accounts[u];if(!d)return;const sc=d.creditScore||0,t=creditTier(sc),ml=maxLoan(sc,d.balance||0);document.getElementById('m-view-body').innerHTML=`
  <h2 class="modal-title">${esc(u)}</h2><p class="modal-sub">Account #${esc(d.accountNumber||'—')}</p>
  <div class="two-col">
    <div><div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t40);margin-bottom:10px;font-family:'JetBrains Mono',monospace;">Account</div>
    <div class="ir"><span class="ik">Balance</span><span class="iv" style="color:var(--gold);">◆${fn(d.balance||0)}</span></div>
    <div class="ir"><span class="ik">Credit Score</span><span class="iv" style="color:${t.c};">${sc}/1000 (${t.l})</span></div>
    <div class="ir"><span class="ik">Max Loan</span><span class="iv" style="color:${ml>0?'var(--em-lt)':'var(--red)'};">${ml<=0?'Not Eligible':'◆'+fn(ml)}</span></div>
    <div class="ir"><span class="ik">Account #</span><span class="iv">${esc(d.accountNumber||'—')}</span></div>
    <div class="ir"><span class="ik">Created</span><span class="iv">${d.createdAt?new Date(d.createdAt).toLocaleString():'—'}</span></div>
    <div class="ir"><span class="ik">Created By</span><span class="iv">${esc(d.createdBy||'—')}</span></div></div>
    <div><div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t40);margin-bottom:10px;font-family:'JetBrains Mono',monospace;">Card</div>
    ${d.cardNumber?`
    <div class="ir"><span class="ik">Number</span><span class="iv">${esc(d.cardNumber)}</span></div>
    <div class="ir"><span class="ik">Type</span><span class="iv">${esc(String(d.cardType||'—').toUpperCase())}</span></div>
    <div class="ir"><span class="ik">Expiry</span><span class="iv">${esc(d.expiry||d.cardExpiry||'—')}</span></div>
    <div class="ir"><span class="ik">CVV</span><span class="iv">${esc(d.cvv||'—')}</span></div>
    <div class="ir"><span class="ik">Limit</span><span class="iv" style="color:var(--gold);">◆${fn(d.creditLimit||0)}</span></div>
    <div class="ir"><span class="ik">Status</span><span class="iv">${(d.cardFrozen||d.frozen)?'<span class="badge br">FROZEN</span>':'<span class="badge bg">ACTIVE</span>'}</span></div>`
    :'<p style="color:var(--t40);font-size:12px;">No card issued.</p>'}</div>
  </div>
  <div class="fa">
    <button class="btn btn-ghost" onclick="cm('m-view')">Close</button>
    <button class="btn btn-gold" onclick="cm('m-view');editAcct('${u}')">Edit Account</button>
  </div>`;om('m-view');}

function editAcct(u){const d=accounts[u];if(!d)return;document.getElementById('m-edit-body').innerHTML=`
  <h2 class="modal-title">Edit — ${esc(u)}</h2><p class="modal-sub">Account #${esc(d.accountNumber||'—')}</p>
  <div class="fg">
    <div class="fsec">Account Details</div>
    <div class="ff"><label class="lbl">New Password (blank = keep)</label><input class="inp" id="e-pw" type="text" placeholder="Leave blank to keep"></div>
    <div class="ff"><label class="lbl">Balance (◆)</label><input class="inp" id="e-bal" type="number" value="${d.balance||0}" step="0.01"></div>
    <div class="ff"><label class="lbl">Credit Score (1–1000)</label><input class="inp" id="e-sc" type="number" value="${d.creditScore||500}" min="1" max="1000"></div>
    <div class="ff"><label class="lbl">Account Number</label><input class="inp" id="e-an" value="${d.accountNumber||''}"></div>
    ${d.cardNumber?`<div class="fsec">Card Details</div>
    <div class="ff"><label class="lbl">Card Number</label><input class="inp" id="e-cn" value="${esc(d.cardNumber||'')}"></div>
    <div class="ff"><label class="lbl">CVV</label><input class="inp" id="e-cvv" value="${esc(d.cvv||'')}"></div>
    <div class="ff"><label class="lbl">Expiry</label><input class="inp" id="e-exp" value="${esc(d.expiry||d.cardExpiry||'')}"></div>
    <div class="ff"><label class="lbl">Credit Limit (◆)</label><input class="inp" id="e-lim" type="number" value="${d.creditLimit||5000}"></div>
    <div class="ff"><label class="lbl">Card Type</label><select class="inp" id="e-ct"><option value="credit" ${d.cardType==='credit'?'selected':''}>Credit</option><option value="debit" ${d.cardType==='debit'?'selected':''}>Debit</option></select></div>
    <div class="ff"><label class="lbl">Card Status</label><select class="inp" id="e-frz"><option value="false" ${!d.cardFrozen&&!d.frozen?'selected':''}>Active</option><option value="true" ${d.cardFrozen||d.frozen?'selected':''}>Frozen</option></select></div>`:''}</div>
  <div class="fa"><button class="btn btn-ghost" onclick="cm('m-edit')">Cancel</button><button class="btn btn-gold" onclick="saveEdit('${u}')">Save Changes</button></div>`;om('m-edit');}
async function saveEdit(u){const up={};const pw=document.getElementById('e-pw')?.value;if(pw)up.password=pw;up.balance=parseFloat(document.getElementById('e-bal').value)||0;up.creditScore=parseInt(document.getElementById('e-sc').value)||500;up.accountNumber=document.getElementById('e-an').value;const cn=document.getElementById('e-cn');if(cn){up.cardNumber=cn.value;up.cvv=document.getElementById('e-cvv').value;up.expiry=document.getElementById('e-exp').value;up.cardExpiry=up.expiry;up.creditLimit=parseFloat(document.getElementById('e-lim').value)||5000;up.cardType=document.getElementById('e-ct').value;const fr=document.getElementById('e-frz').value==='true';up.cardFrozen=fr;up.frozen=fr;}await db.ref('users/'+u).update(up);accounts[u]={...accounts[u],...up};await la('ACCOUNT_EDITED',`Admin edited account: ${u}`);toast(`${u} updated.`,'ok');cm('m-edit');if(curPage==='accounts')rAccounts(document.getElementById('content'));if(curPage==='dashboard')rDashboard(document.getElementById('content'));}

function openResetPw(u){document.getElementById('m-reset-pw-body').innerHTML=`<h2 class="modal-title">Reset Password</h2><p class="modal-sub">Account: ${esc(u)}</p><div class="inp-g"><label class="lbl">New Password</label><div class="inp-add"><input class="inp" id="rp2-pw" type="text" placeholder="New password"><button class="inp-add-btn" onclick="const c='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$';let p='';for(let i=0;i<12;i++)p+=c[Math.floor(Math.random()*c.length)];document.getElementById('rp2-pw').value=p;">Generate</button></div></div><div class="fa"><button class="btn btn-ghost" onclick="cm('m-reset-pw')">Cancel</button><button class="btn btn-warn" onclick="doResetPw2('${u}')">Reset Password</button></div>`;om('m-reset-pw');}
async function doResetPw2(u){const pw=document.getElementById('rp2-pw').value;if(!pw){toast('Enter new password.','err');return;}await db.ref('users/'+u+'/password').set(pw);accounts[u]={...accounts[u],password:pw};await la('PASSWORD_RESET',`Admin reset password for ${u}`);toast(`Password reset for ${u}.`,'ok');cm('m-reset-pw');}

function confirmDel(u){document.getElementById('m-confirm-body').innerHTML=`<h2 class="modal-title" style="color:var(--red);">Delete "${esc(u)}"?</h2><p class="modal-sub">This permanently deletes the account and all its data.</p><div class="alert alert-danger">${svg('M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71')} All balance, transactions, card data will be gone forever.</div><div class="fa"><button class="btn btn-ghost" onclick="cm('m-confirm')">Cancel</button><button class="btn btn-danger" onclick="delAcct('${u}')">Delete Permanently</button></div>`;om('m-confirm');}
async function delAcct(u){await db.ref('users/'+u).remove();delete accounts[u];await la('ACCOUNT_DELETED',`Admin deleted account: ${u}`);toast(`${u} deleted.`,'info');cm('m-confirm');rAccounts(document.getElementById('content'));}

async function toggleFreeze(u,isFr){await db.ref('users/'+u).update({cardFrozen:!isFr,frozen:!isFr});accounts[u]={...accounts[u],cardFrozen:!isFr,frozen:!isFr};await la(isFr?'CARD_UNFROZEN':'CARD_FROZEN',`Admin ${isFr?'unfroze':'froze'} ${u}'s card`);toast(`Card ${isFr?'unfrozen':'frozen'} for ${u}.`,'info');if(curPage==='accounts')rAccounts(document.getElementById('content'));if(curPage==='card-issuer')rCardIssuer(document.getElementById('content'));}

// ══════════════════════════════════════════════════════════════════════════════
//  RISK ENGINE
// ══════════════════════════════════════════════════════════════════════════════
function riskScore(amt,bal,sc,debt,purpose,defs,paid,age){let s=0;s+=Math.min(25,Math.round((sc/1000)*25));let ltb=20;if(amt>0&&bal<=0)ltb=0;else if(amt>0){const r=amt/bal;ltb=r>5?0:r>3?5:r>2?10:r>1?15:20;}s+=ltb;let ds=20;if(debt>0){const dr=(debt+amt)/Math.max(bal,1);ds=dr>10?0:dr>5?4:dr>2?10:20;}s+=ds;let hs=10;const tot=paid+defs;if(tot>0)hs=Math.round((paid/tot)*20);hs=Math.max(0,Math.min(20,hs-defs*4));s+=hs;const pm={Business:10,Investment:8,Personal:7,Emergency:5,Unknown:2};s+=(pm[purpose]||5);s+=(age>=180?5:age>=90?4:age>=30?2:age>=7?1:0);return s;}

// ══════════════════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function fn(n){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fd(ts){if(!ts)return '—';try{return new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});}catch{return '—';}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function filterTbl(tbodyId,q){document.querySelectorAll(`#${tbodyId} tr[data-search]`).forEach(tr=>tr.style.display=tr.dataset.search.includes(q.toLowerCase())?'':'none');}
function loanBadge(s){const m={active:'bg',pending:'ba',paid:'bb',denied:'br',approved:'bg'};return`<span class="badge ${m[s]||'bgr'}">${s||'—'}</span>`;}
function scoreBadge(sc){const t=creditTier(sc);return`<span style="font-size:11px;color:${t.c};font-weight:700;">${sc||'—'} (${t.l})</span>`;}
function creditTier(sc){
  if(sc>=951)return{l:'Elite',c:'#e2c97e'};if(sc>=851)return{l:'Excellent',c:'var(--em-lt)'};
  if(sc>=751)return{l:'Very Good',c:'var(--blue)'};if(sc>=651)return{l:'Good',c:'var(--gold)'};
  if(sc>=501)return{l:'Fair',c:'var(--amb)'};if(sc>=351)return{l:'Poor',c:'var(--red)'};
  if(sc>=201)return{l:'Very Poor',c:'var(--red)'};return{l:'Defaulted',c:'#903030'};
}
function maxLoan(sc,bal){if(sc<201)return 0;if(sc<351)return Math.min(500,bal*.5);if(sc<501)return Math.min(2000,bal*1);if(sc<651)return Math.min(5000,bal*2);if(sc<751)return Math.min(10000,bal*3);if(sc<851)return Math.min(20000,bal*4);if(sc<951)return Math.min(50000,bal*6);return bal*10;}
async function la(action,description){try{await db.ref('audit').push({action,description,by:admin?.username,timestamp:Date.now()});}catch(e){}}
async function ltx(u,desc,amt,type){try{await db.ref('users/'+u+'/transactions').push({description:desc,amount:amt,type,date:new Date().toISOString()});}catch(e){}}
function svg(d){return`<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:13px;height:13px;display:inline;vertical-align:middle;"><path stroke-linecap="round" stroke-linejoin="round" d="${d}"/></svg>`;}
function logout(){admin=null;Object.keys(accounts).forEach(k=>delete accounts[k]);document.getElementById('app').classList.remove('active');document.getElementById('login-screen').style.display='flex';document.getElementById('l-u').value='';document.getElementById('l-p').value='';}
</script>
